<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#07111f">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>가계부</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    --primary: #2563eb;
    --primary-active: #1d4ed8;
    --primary-soft: #eff6ff;
    --canvas: #ffffff;
    --surface-soft: #f4f6fa;
    --surface-card: #ffffff;
    --surface-muted: #f8fafc;
    --surface-dark: #2563eb;
    --surface-dark-elevated: rgba(255,255,255,.14);
    --hairline: #e9edf3;
    --hairline-strong: #d8dee8;
    --ink: #16181d;
    --body: #3f4652;
    --body-strong: #1f2430;
    --muted: #6f7785;
    --muted-soft: #a0a8b5;
    --sub: #7b8493;
    --on-primary: #ffffff;
    --on-dark: #ffffff;
    --on-dark-soft: rgba(255,255,255,.72);
    --error: #ef4444;
    --success: #22c55e;
    --warning: #f59e0b;
    --shadow-soft: 0 10px 30px rgba(19, 31, 56, .07);
    --shadow-card: 0 4px 16px rgba(19, 31, 56, .045);
    --radius-lg: 22px;
    --radius-md: 16px;
    --radius-sm: 10px;
  }
  body {
    font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
    background: var(--surface-soft);
    color: var(--ink);
    min-height: 100vh;
    font-weight: 400;
  }
  button, input, select { font-family: inherit; }
  .page {
    display: none;
    padding: 0 0 calc(92px + env(safe-area-inset-bottom));
    max-width: 480px;
    margin: 0 auto;
    min-height: 100vh;
  }
  .page.active { display: block; }
  /* ── NAV ── */
  .nav {
    display: flex;
    background: rgba(255,255,255,.92);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    border-top: 1px solid rgba(216,222,232,.8);
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
    padding: 6px 10px calc(6px + env(safe-area-inset-bottom));
    max-width: 480px;
    margin: 0 auto;
  }
  .nav-btn {
    flex: 1;
    padding: 8px 0 7px;
    border: none;
    background: none;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    font-size: 11px;
    font-weight: 700;
    color: var(--muted-soft);
    border-radius: 14px;
    transition: all .16s ease;
  }
  .nav-btn.active { color: var(--primary); background: var(--primary-soft); }
  .nav-btn svg { width: 22px; height: 22px; stroke-width: 1.8; }
  .nav-btn.active svg { stroke-width: 2.2; }
