<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#f7f5ef">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>가계부</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  :root {
    --primary: #2563eb;
    --primary-active: #1d4ed8;
    --primary-soft: #eff6ff;
    --canvas: #ffffff;
    --surface-soft: #f4f6fa;
    --surface-card: #ffffff;
    --surface-muted: #f8fafc;
    --surface-dark: #2563eb;
    --surface-dark-elevated: rgba(255,255,255,.14);
    --hairline: #e9edf3;
    --hairline-strong: #d8dee8;
    --ink: #16181d;
    --body: #3f4652;
    --body-strong: #1f2430;
    --muted: #6f7785;
    --muted-soft: #a0a8b5;
    --sub: #7b8493;
    --on-primary: #ffffff;
    --on-dark: #ffffff;
    --on-dark-soft: rgba(255,255,255,.72);
    --error: #ef4444;
    --success: #22c55e;
    --warning: #f59e0b;
    --shadow-soft: 0 10px 30px rgba(19, 31, 56, .07);
    --shadow-card: 0 4px 16px rgba(19, 31, 56, .045);
    --radius-lg: 22px;
    --radius-md: 16px;
    --radius-sm: 10px;
  }

  body {
    font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
    background: var(--surface-soft);
    color: var(--ink);
    min-height: 100vh;
    font-weight: 400;
  }

  button, input, select { font-family: inherit; }

  .page {
    display: none;
    padding: 0 0 calc(92px + env(safe-area-inset-bottom));
    max-width: 480px;
    margin: 0 auto;
    min-height: 100vh;
  }
  .page.active { display: block; }

  /* ── NAV ── */
  .nav {
    display: flex;
    background: rgba(255,255,255,.92);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    border-top: 1px solid rgba(216,222,232,.8);
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
    padding: 6px 10px calc(6px + env(safe-area-inset-bottom));
    max-width: 480px;
    margin: 0 auto;
  }
  .nav-btn {
    flex: 1;
    padding: 8px 0 7px;
    border: none;
    background: none;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    font-size: 11px;
    font-weight: 700;
    color: var(--muted-soft);
    border-radius: 14px;
    transition: all .16s ease;
  }
  .nav-btn.active { color: var(--primary); background: var(--primary-soft); }
  .nav-btn svg { width: 22px; height: 22px; stroke-width: 1.8; }
  .nav-btn.active svg { stroke-width: 2.2; }

  /* ── HOME HERO ── */
  .home-header {
    position: relative;
    overflow: hidden;
    background:
      radial-gradient(circle at 85% 20%, rgba(255,255,255,.22) 0, transparent 34%),
      linear-gradient(160deg, #1d4ed8 0%, #2563eb 46%, #3b82f6 100%);
    padding: calc(env(safe-area-inset-top) + 22px) 22px 24px;
    color: var(--on-dark);
    border-bottom-left-radius: 28px;
    border-bottom-right-radius: 28px;
    box-shadow: 0 14px 34px rgba(37,99,235,.2);
  }
  .home-header::after {
    content: '';
    position: absolute;
    right: -50px;
    bottom: -65px;
    width: 230px;
    height: 230px;
    border-radius: 50%;
    background: rgba(255,255,255,.09);
    pointer-events: none;
  }
  .home-header > * { position: relative; z-index: 1; }
  .home-header > div:first-child {
    display: block !important;
    margin-bottom: 26px !important;
  }
  .home-sub-label {
    font-size: 31px;
    font-weight: 800;
    color: var(--on-dark);
    line-height: 1.08;
    letter-spacing: -1.1px;
  }
  .home-month-label {
    margin-top: 7px;
    font-size: 15px;
    font-weight: 500;
    color: rgba(255,255,255,.76);
    text-align: left;
  }
  .home-total-label {
    font-size: 13px;
    font-weight: 700;
    color: rgba(255,255,255,.72);
    margin-bottom: 8px;
    letter-spacing: -.1px;
    text-transform: none;
  }
  .home-total-big {
    font-size: clamp(52px, 15vw, 68px);
    font-weight: 800;
    color: var(--on-dark);
    line-height: .98;
    margin-bottom: 10px;
    letter-spacing: -2.6px;
  }
  .base-equiv { font-size: 13px; font-weight: 500; color: var(--on-dark-soft); }
  .rate-info { font-size: 12px; font-weight: 500; color: rgba(255,255,255,.55); margin-top: 5px; }
  .currency-pills {
    display: flex;
    flex-wrap: nowrap;
    gap: 8px;
    margin: 18px 0 0;
    overflow-x: auto;
    padding-bottom: 1px;
    scrollbar-width: none;
  }
  .currency-pills::-webkit-scrollbar { display: none; }
  .currency-pill {
    flex: 0 0 auto;
    font-size: 13px;
    font-weight: 800;
    color: var(--on-dark);
    background: rgba(255,255,255,.14);
    border: 1px solid rgba(255,255,255,.18);
    padding: 9px 12px;
    display: flex;
    align-items: center;
    gap: 7px;
    border-radius: 999px;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
  }

  /* ── FAB ── */
  .fab {
    position: fixed;
    bottom: calc(82px + env(safe-area-inset-bottom));
    right: max(20px, calc((100vw - 480px) / 2 + 20px));
    width: 56px;
    height: 56px;
    border-radius: 18px;
    background: var(--primary);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 99;
    box-shadow: 0 12px 26px rgba(37,99,235,.32);
    transition: transform .15s ease, background .15s ease;
  }
  .fab:active { background: var(--primary-active); transform: scale(.96); }
  .fab svg { width: 24px; height: 24px; color: #fff; stroke-width: 2.7; }

  /* ── SECTION TITLE ── */
  .section-title {
    font-size: 15px;
    font-weight: 800;
    color: var(--body-strong);
    padding: 24px 22px 12px;
    letter-spacing: -.2px;
    text-transform: none;
  }

  /* ── EXPENSE LIST ── */
  .expense-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
    padding: 0 14px 18px;
  }
  .swipe-wrap {
    position: relative;
    overflow: hidden;
    border-radius: var(--radius-md);
    box-shadow: var(--shadow-card);
  }
  .expense-item {
    background: var(--canvas);
    border: 1px solid rgba(233,237,243,.9);
    border-radius: var(--radius-md);
    padding: 15px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    min-height: 78px;
    transition: transform .18s ease;
    will-change: transform;
    width: 100%;
    position: relative;
    z-index: 1;
  }
  .expense-icon { display: none; }
  .expense-info { flex: 1; min-width: 0; }
  .expense-info > div:first-child { gap: 8px !important; }
  .expense-right { flex-shrink: 0; display: flex; align-items: center; gap: 8px; }
  .expense-right-inner { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
  .expense-cat {
    display: inline-block;
    font-size: 12px;
    font-weight: 800;
    color: #92400e !important;
    background: #fff2dc !important;
    padding: 5px 9px;
    border-radius: 8px;
    letter-spacing: -.1px;
  }
  .expense-meta {
    font-size: 14px;
    font-weight: 600;
    color: var(--body);
    margin-top: 0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .expense-date { font-size: 12px; font-weight: 500; color: var(--muted); }
  .expense-amount {
    font-size: 19px;
    font-weight: 800;
    color: var(--ink);
    display: flex;
    align-items: center;
    gap: 4px;
    letter-spacing: -.5px;
  }
  .cur-flag { font-size: 18px; width: 24px; text-align: center; flex-shrink: 0; }

  .swipe-actions { position: absolute; right: 0; top: 0; bottom: 0; display: flex; }
  .swipe-edit-btn, .swipe-delete-btn {
    width: 74px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 4px;
    color: #fff;
    font-size: 11px;
    font-weight: 800;
    cursor: pointer;
  }
  .swipe-edit-btn { background: var(--primary); }
  .swipe-delete-btn { background: var(--error); }
  .swipe-edit-btn svg, .swipe-delete-btn svg { width: 18px; height: 18px; stroke-width: 2; }

  /* ── MODAL ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(15,23,42,.42);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    z-index: 200;
    align-items: flex-end;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--canvas);
    border-radius: 28px 28px 0 0;
    width: 100%;
    max-width: 480px;
    margin: 0 auto;
    padding: 14px 20px calc(24px + env(safe-area-inset-bottom));
    box-shadow: 0 -20px 50px rgba(15,23,42,.18);
  }
  .modal-handle {
    width: 38px;
    height: 4px;
    background: var(--hairline-strong);
    border-radius: 99px;
    margin: 0 auto 20px;
  }
  .modal-title { font-size: 22px; font-weight: 800; margin-bottom: 18px; letter-spacing: -.5px; color: var(--ink); }

  .amount-row {
    display: flex;
    gap: 8px;
    margin-bottom: 10px;
    align-items: stretch;
  }
  .amount-input-wrap { flex: 1; }
  .amount-input {
    width: 100%;
    font-size: 34px;
    font-weight: 800;
    border: 1px solid var(--hairline);
    outline: none;
    background: var(--surface-muted);
    border-radius: 16px;
    padding: 14px 16px;
    color: var(--ink);
    letter-spacing: -1px;
  }
  .amount-input:focus { border-color: rgba(37,99,235,.45); background: #fff; box-shadow: 0 0 0 4px rgba(37,99,235,.08); }
  .currency-select {
    background: var(--primary-soft);
    border: 1px solid #dbeafe;
    padding: 0 12px;
    font-size: 14px;
    font-weight: 800;
    color: var(--primary);
    cursor: pointer;
    outline: none;
    min-width: 92px;
    border-radius: 16px;
  }

  .input-row { display: flex; gap: 8px; margin-bottom: 16px; }
  .input-field {
    flex: 1;
    background: var(--surface-muted);
    border: 1px solid var(--hairline);
    border-radius: 14px;
    padding: 13px 14px;
    font-size: 14px;
    font-weight: 500;
    color: var(--ink);
    outline: none;
    min-width: 0;
  }
  .input-field:focus { border-color: rgba(37,99,235,.45); background: #fff; box-shadow: 0 0 0 4px rgba(37,99,235,.08); }
  .input-field::placeholder { color: var(--muted-soft); }

  .cat-label-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .cat-label { font-size: 13px; font-weight: 800; color: var(--body-strong); }
  .cat-manage-btn {
    font-size: 13px;
    font-weight: 800;
    color: var(--primary);
    background: none;
    border: none;
    cursor: pointer;
    padding: 4px 6px;
  }
  .cat-wrap { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
  .cat-tag, .cat-add-btn {
    padding: 9px 13px;
    border-radius: 999px;
    border: 1px solid var(--hairline);
    background: var(--surface-muted);
    font-size: 13px;
    font-weight: 800;
    cursor: pointer;
    transition: all .12s ease;
    white-space: nowrap;
    color: var(--body);
  }
  .cat-tag.selected { border-color: var(--primary); background: var(--primary); color: #fff; box-shadow: 0 8px 16px rgba(37,99,235,.2); }
  .cat-add-btn { border-style: dashed; color: var(--muted); background: #fff; }

  .save-btn {
    width: 100%;
    padding: 16px;
    border-radius: 17px;
    background: var(--primary);
    color: var(--on-primary);
    border: none;
    font-size: 15px;
    font-weight: 800;
    cursor: pointer;
    margin-top: 2px;
    box-shadow: 0 10px 24px rgba(37,99,235,.22);
  }
  .save-btn:active { background: var(--primary-active); transform: scale(.99); }
  .save-btn:disabled { opacity: .4; cursor: not-allowed; }

  /* ── STATISTICS ── */
  .stat-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: calc(env(safe-area-inset-top) + 20px) 20px 14px;
    background: var(--surface-soft);
  }
  .stat-header h2, #page-settings h2 { font-size: 26px; font-weight: 800; color: var(--ink); letter-spacing: -.8px; }
  .month-nav { display: flex; align-items: center; gap: 6px; background: #fff; border: 1px solid var(--hairline); border-radius: 999px; padding: 3px; }
  .month-nav button {
    width: 30px;
    height: 30px;
    background: transparent;
    border: none;
    cursor: pointer;
    color: var(--ink);
    font-size: 19px;
    border-radius: 999px;
  }
  .month-nav button:active { background: var(--surface-muted); }
  .month-nav span { font-size: 13px; font-weight: 800; min-width: 64px; text-align: center; color: var(--body); }

  #page-stat { background: var(--surface-soft); }
  #page-stat .stat-card, .stat-card {
    background: var(--canvas);
    border: 1px solid var(--hairline);
    border-radius: var(--radius-lg);
    padding: 18px;
    margin: 0 14px 12px;
    box-shadow: var(--shadow-card);
  }
  .stat-card-title { font-size: 14px; font-weight: 800; color: var(--body-strong); margin-bottom: 14px; letter-spacing: -.1px; text-transform: none; }
  .stat-total-list { display: flex; flex-direction: column; gap: 8px; }
  .stat-total-row { font-size: 28px; font-weight: 800; color: var(--ink); display: flex; align-items: center; gap: 8px; letter-spacing: -.7px; }
  .stat-total-row.equiv { font-size: 14px; color: var(--primary); font-weight: 800; margin-top: 6px; }
  .pie-wrap { display: flex; flex-direction: column; align-items: center; padding: 8px 0; }
  canvas#pieChart { max-width: 190px; }
  .cat-bar-list { display: flex; flex-direction: column; gap: 16px; }
  .cat-bar-header { display: flex; justify-content: space-between; margin-bottom: 7px; font-size: 14px; font-weight: 600; color: var(--body); }
  .cat-bar-header span:last-child { font-weight: 800; color: var(--ink); }
  .cat-bar-bg { height: 8px; background: var(--surface-muted); border-radius: 999px; overflow: hidden; }
  .cat-bar-fill { height: 100%; border-radius: 999px; background: var(--primary); transition: width .45s ease; }
  .day-group { margin: 0 0 12px; overflow: hidden; border: 1px solid var(--hairline); border-radius: 18px; background: #fff; }
  .day-group-header {
    font-size: 13px;
    font-weight: 800;
    color: var(--body);
    padding: 13px 16px;
    display: flex;
    justify-content: space-between;
    background: var(--surface-muted);
    border-bottom: 1px solid var(--hairline);
    text-transform: none;
    letter-spacing: 0;
  }

  /* ── SETTINGS ── */
  #page-settings { padding: 0 0 calc(92px + env(safe-area-inset-bottom)); background: var(--surface-soft); }
  #page-settings h2 { padding: calc(env(safe-area-inset-top) + 20px) 20px 14px; background: var(--surface-soft); }
  #page-settings > div { margin-top: 0; }
  .settings-section {
    background: var(--canvas);
    border: 1px solid var(--hairline);
    border-radius: var(--radius-lg);
    padding: 0 18px;
    margin: 0 14px 12px;
    box-shadow: var(--shadow-card);
  }
  .settings-section + .settings-section { margin-top: 0; }
  .settings-section h3 { font-size: 14px; font-weight: 800; color: var(--body-strong); padding: 16px 0 12px; border-bottom: 1px solid var(--hairline); margin-bottom: 0; text-transform: none; letter-spacing: 0; }
  .setting-row { display: flex; align-items: center; justify-content: space-between; padding: 15px 0; border-bottom: 1px solid var(--hairline); }
  .setting-row:last-child { border-bottom: none; }
  .setting-label { display: flex; align-items: center; gap: 10px; font-size: 15px; font-weight: 700; color: var(--ink); }
  .setting-flag { font-size: 20px; }
  .toggle { position: relative; width: 48px; height: 28px; }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .toggle-slider { position: absolute; inset: 0; background: #d8dee8; border-radius: 999px; cursor: pointer; transition: .2s; }
  .toggle-slider:before { content:''; position: absolute; width: 22px; height: 22px; left: 3px; top: 3px; background: #fff; border-radius: 50%; transition: .2s; box-shadow: 0 2px 6px rgba(15,23,42,.18); }
  .toggle input:checked + .toggle-slider { background: var(--primary); }
  .toggle input:checked + .toggle-slider:before { transform: translateX(20px); }
  .radio-group { display: flex; flex-direction: column; }
  .radio-row { display: flex; align-items: center; justify-content: space-between; padding: 15px 0; border-bottom: 1px solid var(--hairline); cursor: pointer; font-weight: 600; color: var(--body); }
  .radio-row:last-child { border-bottom: none; }
  .radio-row input[type=radio] { accent-color: var(--primary); width: 18px; height: 18px; cursor: pointer; }

  /* ── COMMON ── */
  .loading { text-align: center; padding: 42px 20px; color: var(--muted); font-weight: 600; }
  .empty { text-align: center; padding: 42px 20px; color: var(--muted); font-size: 14px; font-weight: 500; line-height: 1.7; }

  /* ── CATEGORY MODAL ── */
  .cat-modal-overlay, .manage-modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(15,23,42,.42);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    z-index: 300;
  }
  .cat-modal-overlay { align-items: center; justify-content: center; }
  .manage-modal-overlay { align-items: flex-end; }
  .cat-modal-overlay.open, .manage-modal-overlay.open { display: flex; }
  .cat-modal {
    background: var(--canvas);
    border-radius: 24px;
    padding: 22px;
    width: calc(100% - 40px);
    max-width: 340px;
    box-shadow: var(--shadow-soft);
  }
  .cat-modal h3 { font-size: 19px; font-weight: 800; margin-bottom: 16px; }
  .cat-modal input {
    width: 100%;
    background: var(--surface-muted);
    border: 1px solid var(--hairline);
    border-radius: 14px;
    padding: 13px 15px;
    font-size: 14px;
    font-weight: 500;
    outline: none;
    margin-bottom: 12px;
    color: var(--ink);
  }
  .cat-modal input:focus { border-color: rgba(37,99,235,.45); background: #fff; box-shadow: 0 0 0 4px rgba(37,99,235,.08); }
  .cat-modal-btns { display: flex; gap: 8px; }
  .cat-modal-btns button { flex: 1; padding: 13px; border-radius: 14px; border: none; font-size: 13px; font-weight: 800; cursor: pointer; }
  .btn-cancel { background: var(--surface-muted); color: var(--muted); border: 1px solid var(--hairline) !important; }
  .btn-confirm { background: var(--primary); color: #fff; }
  .btn-delete { background: #fff; color: var(--error); border: 1px solid #fecaca !important; }

  .manage-modal {
    background: var(--canvas);
    border-radius: 28px 28px 0 0;
    width: 100%;
    max-width: 480px;
    margin: 0 auto;
    padding: 14px 20px calc(24px + env(safe-area-inset-bottom));
    max-height: 72vh;
    overflow-y: auto;
    box-shadow: 0 -20px 50px rgba(15,23,42,.18);
  }
  .manage-modal h3 { font-size: 22px; font-weight: 800; margin-bottom: 14px; }
  .manage-cat-item { display: flex; align-items: center; padding: 15px 0; border-bottom: 1px solid var(--hairline); gap: 12px; }
  .manage-cat-item:last-child { border-bottom: none; }
  .manage-cat-name { flex: 1; font-size: 15px; font-weight: 800; }
  .manage-cat-count { font-size: 12px; font-weight: 600; color: var(--muted); margin-right: 8px; }
  .icon-btn { background: var(--surface-muted); border: 1px solid var(--hairline); cursor: pointer; padding: 7px; border-radius: 10px; font-size: 15px; }

  /* ── PENDING BADGE ── */
  .pending-badge { display: inline-flex; align-items: center; gap: 5px; font-size: 10px; font-weight: 800; color: #92400e; background: #fffbeb; border: 1px solid #fde68a; border-radius: 999px; padding: 3px 7px; margin-top: 7px; }
  .pending-dot { width: 5px; height: 5px; border-radius: 50%; background: #f59e0b; animation: blink 1.2s ease-in-out infinite; flex-shrink: 0; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }

  /* ── TOAST ── */
  .toast { position: fixed; bottom: calc(86px + env(safe-area-inset-bottom)); left: 50%; transform: translateX(-50%) translateY(12px); background: #111827; color: #fff; padding: 11px 18px; border-radius: 999px; font-size: 13px; font-weight: 800; opacity: 0; transition: opacity .2s, transform .2s; z-index: 999; white-space: nowrap; pointer-events: none; box-shadow: 0 10px 24px rgba(15,23,42,.24); }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ── LOADING OVERLAY ── */
  .load-overlay { position: fixed; inset: 0; z-index: 500; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; transition: opacity .3s; }
  .load-overlay.hidden { opacity: 0; pointer-events: none; }
  .load-blur { position: absolute; inset: 0; backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); background: rgba(244,246,250,.84); }
  .load-box { position: relative; background: var(--canvas); border: 1px solid var(--hairline); border-radius: 24px; padding: 28px 38px; text-align: center; box-shadow: var(--shadow-soft); }
  .load-spinner { width: 34px; height: 34px; border: 3px solid var(--hairline); border-top-color: var(--primary); border-radius: 50%; animation: spin .8s linear infinite; margin: 0 auto 14px; }
  .load-box p { font-size: 15px; font-weight: 800; color: var(--ink); }
  .load-box small { font-size: 12px; font-weight: 500; color: var(--muted); margin-top: 5px; display: block; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── SYNC BAR ── */
  .sync-bar { position: fixed; top: env(safe-area-inset-top); left: 50%; z-index: 400; display: flex; align-items: center; justify-content: center; gap: 8px; padding: 9px 14px; font-size: 12px; font-weight: 800; transform: translateX(-50%) translateY(-140%); transition: transform .25s ease; border-radius: 999px; box-shadow: var(--shadow-card); white-space: nowrap; }
  .sync-bar.show { transform: translateX(-50%) translateY(12px); }
  .sync-bar.syncing { background: #fffbeb; color: #92400e; border: 1px solid #fde68a; }
  .sync-bar.synced { background: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; }
  .sync-bar.error { background: #fef2f2; color: var(--error); border: 1px solid #fecaca; }
  .sync-bar.offline { background: #eff6ff; color: var(--primary); border: 1px solid #bfdbfe; }
  .sync-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
  .sync-dot.spinning { border: 2px solid currentColor; background: transparent; border-top-color: transparent; border-radius: 50%; animation: spin .7s linear infinite; width: 10px; height: 10px; }

/* ─────────────────────────────────────────────
   COMPOSITION RESET: FULL LIQUID DASHBOARD
   기존 박스형 틀을 버리고 한 장의 유리 보드처럼 재구성
───────────────────────────────────────────── */
body {
  min-height: 100svh;
  background:
    radial-gradient(ellipse at 50% -18%, rgba(136,238,255,.34), transparent 42%),
    radial-gradient(ellipse at 108% 9%, rgba(255,78,205,.24), transparent 32%),
    radial-gradient(ellipse at -8% 22%, rgba(76,255,239,.22), transparent 34%),
    radial-gradient(ellipse at 22% 92%, rgba(127,78,255,.30), transparent 38%),
    linear-gradient(150deg, #0f2431 0%, #050713 48%, #130617 100%);
}

body::before {
  background:
    linear-gradient(116deg, transparent 0 30%, rgba(255,255,255,.16) 42%, rgba(255,255,255,.03) 49%, transparent 61%),
    radial-gradient(circle at 50% 6%, rgba(255,255,255,.08), transparent 24%),
    repeating-linear-gradient(90deg, rgba(255,255,255,.014) 0 1px, transparent 1px 15px);
}

.page {
  max-width: 500px;
  padding: 0 0 calc(106px + env(safe-area-inset-bottom));
}

.page::before {
  display: none;
}

.liquid-stage {
  width: min(100%, 500px);
  min-height: calc(100svh - 104px);
  margin: 0 auto;
  padding: calc(env(safe-area-inset-top) + 18px) 14px 0;
  position: relative;
}

.liquid-stage::before {
  content: "";
  position: absolute;
  left: 13px;
  right: 13px;
  top: calc(env(safe-area-inset-top) + 10px);
  height: min(72svh, 650px);
  pointer-events: none;
  border-radius: 42px;
  border: 1px solid rgba(255,255,255,.16);
  background:
    radial-gradient(circle at 78% 15%, rgba(100,239,255,.20), transparent 28%),
    radial-gradient(circle at 16% 90%, rgba(255,94,222,.15), transparent 30%),
    linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.022));
  box-shadow:
    0 32px 110px rgba(0,0,0,.44),
    inset 0 1px 0 rgba(255,255,255,.22),
    inset 0 0 80px rgba(255,255,255,.026);
}

.stage-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  position: relative;
  z-index: 2;
  padding: 12px 10px 16px;
}

.stage-add {
  width: 52px;
  height: 52px;
  flex: 0 0 auto;
  border: 1px solid rgba(255,255,255,.30);
  border-radius: 50%;
  color: #07111f;
  cursor: pointer;
  display: grid;
  place-items: center;
  background:
    radial-gradient(circle at 32% 22%, #fff 0 12%, #8bf9ff 31%, #9293ff 67%, #ff86ce 100%);
  box-shadow:
    0 18px 46px rgba(0,0,0,.36),
    0 0 30px rgba(111,248,255,.32),
    inset 0 2px 0 rgba(255,255,255,.72);
}

.stage-add svg {
  width: 23px;
  height: 23px;
  color: #fff;
  filter: drop-shadow(0 4px 8px rgba(0,0,0,.26));
}

.home-sub-label {
  font-size: 22px;
  line-height: 1.08;
}

.home-month-label {
  margin-top: 5px;
  font-size: 13px;
}

.home-header {
  min-height: 360px;
  margin: 0;
  padding: 24px 22px 24px;
  border-radius: 38px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  background:
    radial-gradient(circle at 74% 20%, rgba(99,246,255,.37), transparent 31%),
    radial-gradient(circle at 30% 8%, rgba(255,255,255,.16), transparent 24%),
    radial-gradient(circle at 18% 92%, rgba(255,93,224,.22), transparent 34%),
    linear-gradient(145deg, rgba(255,255,255,.18), rgba(255,255,255,.052) 62%, rgba(255,255,255,.13));
  box-shadow:
    0 30px 88px rgba(0,0,0,.48),
    0 0 40px rgba(99,246,255,.18),
    inset 0 1px 1px rgba(255,255,255,.48),
    inset 0 -1px 1px rgba(255,255,255,.10);
}

.home-header::before {
  inset: -90px -70px auto auto;
  width: 300px;
  height: 300px;
  opacity: .72;
}

.home-header::after {
  background:
    linear-gradient(122deg, rgba(255,255,255,.36), rgba(255,255,255,.04) 30%, transparent 50%),
    linear-gradient(180deg, transparent 0 58%, rgba(0,0,0,.18)),
    radial-gradient(circle at 84% 18%, rgba(111,248,255,.24), transparent 30%);
}

.orbital-glass {
  position: absolute;
  top: 74px;
  left: 50%;
  width: 190px;
  height: 190px;
  transform: translateX(-50%);
  pointer-events: none;
  filter: drop-shadow(0 18px 38px rgba(0,0,0,.40));
}

.orbital-glass::before,
.orbital-glass::after,
.orbital-glass span {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: 50%;
}

.orbital-glass::before {
  border: 16px solid transparent;
  background:
    linear-gradient(#0a1020, #0a1020) padding-box,
    conic-gradient(from 210deg, #54f7ff, #7d8cff 22%, #ff6ed3 50%, #fff89a 70%, #65ffdf 86%, #54f7ff) border-box;
  box-shadow:
    0 0 34px rgba(111,248,255,.30),
    0 0 42px rgba(255,105,214,.22),
    inset 0 0 30px rgba(0,0,0,.45);
}

.orbital-glass::after {
  inset: 32px;
  background:
    radial-gradient(circle at 35% 20%, rgba(255,255,255,.23), transparent 26%),
    linear-gradient(145deg, rgba(255,255,255,.16), rgba(255,255,255,.045));
  border: 1px solid rgba(255,255,255,.20);
  box-shadow: inset 0 1px 0 rgba(255,255,255,.34);
}

.orbital-glass span:nth-child(1) {
  inset: 69px;
  background: linear-gradient(135deg, #6ff8ff, #b987ff 60%, #ff86ce);
  box-shadow: 0 0 38px rgba(111,248,255,.35);
}

.orbital-glass span:nth-child(2),
.orbital-glass span:nth-child(3) {
  display: none;
}

.currency-pills {
  order: 1;
  align-self: stretch;
  margin: 0 0 196px;
  padding: 0;
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));

}

}

}

.recent-panel {

  background:
    linear-gradient(180deg, rgba(255,255,255,.105), rgba(255,255,255,.035));
  border: 1px solid rgba(255,255,255,.13);
  box-shadow:
    0 18px 58px rgba(0,0,0,.34),
    inset 0 1px 0 rgba(255,255,255,.20);
  backdrop-filter: blur(26px) saturate(1.4);

}

.section-title {
  padding: 0 18px 12px;
}

.expense-list {

}

.expense-list .empty,

.expense-item {

}

.expense-cat {

.expense-meta {

.expense-amount {

.fab {
  display: none !important;
}

.nav {

const todayStr = () => {
  const d = new Date(Date.now() + (settings.timezoneOffset ?? 7) * 3600000);
  return `${d.getUTCFullYear()}-${String(d.getUTCMonth()+1).padStart(2,'0')}-${String(d.getUTCDate()).padStart(2,'0')}`;
};

// 어떤 형식이든 YYYY-MM-DD로 정규화
function normalizeDate(raw) {
  if (!raw) return '';
  const s = String(raw).trim();
  // 이미 YYYY-MM-DD 형식
  if (/^\d{4}-\d{2}-\d{2}/.test(s)) return s.slice(0, 10);
  // 그 외 형식은 Date로 파싱 후 Bangkok 기준으로 변환
  const d = new Date(s);
  if (isNaN(d)) return s.slice(0, 10);
  const offset = (settings.timezoneOffset ?? 7) * 60;
  const local = new Date(d.getTime() + (offset + d.getTimezoneOffset()) * 60000);
  return `${local.getUTCFullYear()}-${String(local.getUTCMonth()+1).padStart(2,'0')}-${String(local.getUTCDate()).padStart(2,'0')}`;
}

function fmtCur(amount, currency) {
  const c = ALL_CURRENCIES[currency] || ALL_CURRENCIES.THB;

}

function flagOf(currency) {

async function fetchWithTimeout(url, options = {}, timeout = 6000) {
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), timeout);
  try {
    return await fetch(url, {...options, signal: controller.signal});
  } finally {
    clearTimeout(timer);
  }
}

// 임의 화폐 → 기준 화폐 환산 (THB 기준 rates 사용)
function convertTo(amount, fromCur, toCur) {
  if (fromCur === toCur) return amount;
  if (!exchangeRates[fromCur] || !exchangeRates[toCur]) return null;
  // fromCur → THB → toCur
  const thb = amount / exchangeRates[fromCur];
  return thb * exchangeRates[toCur];
}
// THB 기준 rates에서: 1THB = rates[X] X
// fromCur→THB: thb = amount / rates[fromCur]  (rates[THB]=1)
// THB→toCur:   result = thb * rates[toCur]

// ── 데이터 로드 ───────────────────────────────────────────
async function loadData() {
  showLoading();
  try {
    const res = await fetchWithTimeout(GAS_URL, {}, 20000);
    const json = await res.json();
    if (json.success) {
      const synced = json.data.map(r => ({
        date: normalizeDate(r.date),
        _row: r._row,
        amount: Number(r.amount) || 0,
        category: r.category || '',
        memo: r.memo || '',
        currency: r.currency || 'THB',
        time: r.time || '',
        requestId: r.requestId || ''
      })).filter(r => r.date && r.amount);

      // 대기열 항목은 유지 (아직 시트에 없으니 중복 없음)
      const pending = loadQueue().map(item => ({
        date: item.date,
        amount: Number(item.amount),
        category: item.category,
        memo: item.memo || '',
        currency: item.currency,
        time: item.time,
        _pending: true,
        _pendingId: item._pendingId
      }));

      // pending 중 이미 synced에 있는 항목 제거 (중복 방지)
      const syncedIds = new Set(synced.map(e => `${e.date}_${e.amount}_${e.category}_${e.time}`));
      const uniquePending = pending.filter(p => !syncedIds.has(`${p.date}_${p.amount}_${p.category}_${p.time}`));
      allExpenses = [...synced, ...uniquePending];
      saveExpenseCache(synced);
      updateCatCounts();
      renderHome();
    }
  } catch(e) {
    const pending = loadQueue().map(item => ({...item, _pending: true}));
    const cached = loadExpenseCache();
    const cachedIds = new Set(cached.map(expenseFingerprint));
    allExpenses = [...cached, ...pending.filter(item => !cachedIds.has(expenseFingerprint(item)))];
    updateCatCounts();
    renderHome();
    if (!allExpenses.length) {
      document.getElementById('recent-list').innerHTML = `<div class="empty">${t('noExpense')}</div>`;
    }
  } finally {
    hideLoading();
  }
}

function updateCatCounts() {
  categories.forEach(c => c.count = 0);
  allExpenses.forEach(e => {
    const c = categories.find(c => c.name === e.category);
    if (c) c.count++;
  });
  // saveCats()는 여기서 호출하지 않음 (loadData 때마다 GAS 요청 방지)
}

// ── 홈 렌더 ──────────────────────────────────────────────
function renderHome() {
  const tzNow = new Date(Date.now() + (settings.timezoneOffset ?? 7) * 3600000);
  const y = tzNow.getUTCFullYear(), m = tzNow.getUTCMonth() + 1;
  const ym = `${y}-${String(m).padStart(2,'0')}`;
  const thisMonth = allExpenses.filter(e => e.date.startsWith(ym));

  // 월 레이블 & 섹션 타이틀
  document.getElementById('home-month-label').textContent = t('monthLabel', y, m);
  document.getElementById('recent-title').textContent = t('recentTitle', y, m);

  // 화폐별 합산
  const totals = {};
  thisMonth.forEach(e => {
    const cur = e.currency || 'THB';
    totals[cur] = (totals[cur] || 0) + e.amount;
  });

  const base = settings.baseCurrency;
  const baseInfo = ALL_CURRENCIES[base];

  // 화폐별 pill (작은 폰트, 나란히)
  const pillEl = document.getElementById('currency-pills');
  const curKeys = Object.keys(ALL_CURRENCIES).filter(c => totals[c]);
  pillEl.innerHTML = curKeys.map(c =>
    `<div class="currency-pill">${flagOf(c)} ${c} ${fmtCur(totals[c], c)}</div>`
  ).join('');

  // 기준 화폐 합산 크게 표시
  const equivEl = document.getElementById('base-equiv');
  const rateEl = document.getElementById('rate-info');
  const totalBigEl = document.getElementById('home-total-big');
  const totalLabelEl = document.getElementById('home-total-label');

  if (curKeys.length === 0) {
    totalLabelEl.textContent = '';
    totalBigEl.textContent = `${baseInfo.symbol}0`;
    equivEl.textContent = ''; rateEl.textContent = '';
  } else {
    let totalBase = 0; let ok = Object.keys(exchangeRates).length > 0;
    Object.entries(totals).forEach(([cur, amt]) => {
      const v = convertTo(amt, cur, base);
      if (v === null) ok = false; else totalBase += v;
    });
    if (ok) {
      totalLabelEl.textContent = t('baseEquivLabel', t('curNames')[base] || baseInfo.name);
      totalBigEl.textContent = `${fmtCur(Math.round(totalBase), base)}`;
      rateEl.textContent = rateUpdatedAt ? t('rateInfo', rateUpdatedAt) : '';
    } else {
      totalLabelEl.textContent = ''; totalBigEl.textContent = '';
      equivEl.textContent = ''; rateEl.textContent = '';
    }
  }

  // 이번 달 내역만, 날짜+시간 내림차순
  const list = document.getElementById('recent-list');
  if (!thisMonth.length) {
    list.innerHTML = `<div class="empty">${t('noExpense')}</div>`;
    return;
  }
  // 시간이 "HH:MM" 형식인지 검증
  const validTime = t => /^\d{2}:\d{2}$/.test(t || '');
  const sorted = [...thisMonth].sort((a, b) => {
    const da = a.date + (validTime(a.time) ? a.time : '00:00');
    const db = b.date + (validTime(b.time) ? b.time : '00:00');
    return db.localeCompare(da);
  });
  list.innerHTML = sorted.map((e, i) => {
    const cat = categories.find(c => c.name === e.category);

    const cur = e.currency || 'THB';
    const timeStr = validTime(e.time) ? ` ${e.time}` : '';
    const idx = allExpenses.indexOf(e);
    const pendingHTML = e._pending ? `<div class="pending-badge"><div class="pending-dot"></div>${t('pendingBadge')}</div>` : '';
    const catColor = getCatColor(e.category || '기타');
    return `<div class="swipe-wrap" id="sw-home-${idx}">
      <div class="expense-item">
        <div class="expense-info">
          <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;">
            <div class="expense-cat" style="background:${catColor}">${e.category || '기타'}</div>
            ${e.memo ? `<div class="expense-memo">— ${e.memo}</div>` : ''}
          </div>
          ${pendingHTML}
        </div>
        <div class="expense-right">
          <span class="cur-flag">${flagOf(cur)}</span>
          <div class="expense-right-inner">
            <div class="expense-date">${e.date}${timeStr}</div>
            <div class="expense-amount">-${fmtCur(e.amount, cur)}</div>
          </div>
        </div>
      </div>
      <div class="swipe-actions">
        <div class="swipe-edit-btn" onclick="editExpense(${idx})">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          ${t('edit')}
        </div>
        <div class="swipe-delete-btn" onclick="deleteExpense(${idx})">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
          ${t('del')}
        </div>
      </div>
    </div>`;
  }).join('');
}

// ── 오프라인 대기열 ───────────────────────────────────────
function loadQueue() {
  try { return JSON.parse(localStorage.getItem('pendingQueue') || '[]'); } catch { return []; }
}
function expenseFingerprint(item) {
  return [
    normalizeDate(item.date),
    Number(item.amount) || 0,
    item.category || '',
    item.memo || '',
    item.currency || 'THB',
    item.time || ''
  ].join('|');
}
function saveQueue(q) {
  const seen = new Set();
  const unique = q.filter(item => {
    const key = item._requestId || expenseFingerprint(item);
    if (seen.has(key)) return false;
    seen.add(key);
    return true;
  });
  localStorage.setItem('pendingQueue', JSON.stringify(unique));
}

let isFlushingQueue = false;
let isSavingExpense = false;

async function flushQueue() {
  if (isFlushingQueue) return;
  const q = loadQueue();
  if (!q.length) return;
  isFlushingQueue = true;
  try {
    const latestResponse = await fetchWithTimeout(GAS_URL, {}, 20000);
    const latestJson = await latestResponse.json();
    const serverFingerprints = new Set(
      latestJson.success ? latestJson.data.map(expenseFingerprint) : []
    );
    const remaining = [];
    for (const item of q) {
      if (serverFingerprints.has(expenseFingerprint(item))) continue;
      try {
        const params = new URLSearchParams({
          action:'addExpense', date:item.date, amount:item.amount,
          category:item.category, memo:item.memo||'', currency:item.currency,
          time:item.time, requestId:item._requestId || ''
        });
        const r = await fetchWithTimeout(`${GAS_URL}?${params}`, {}, 20000);
        const j = await r.json();
        if (!j.success) remaining.push(item);
      } catch {
        remaining.push(item);
      }
    }
    saveQueue(remaining);
    if (remaining.length < q.length) {
      await loadData();
      showSync('synced');
    }
  } finally {
    isFlushingQueue = false;
  }
}

async function saveExpense() {
  if (isSavingExpense) return;
  const amount = Number(document.getElementById('amount-input').value);
  const date = document.getElementById('date-input').value;
  const memo = document.getElementById('memo-input').value.trim();
  const currency = document.getElementById('currency-select').value;
  if (!amount || amount <= 0) { alert('금액을 입력해주세요'); return; }
  if (!selectedCat) { alert('분류를 선택해주세요'); return; }
  isSavingExpense = true;
  const saveBtn = document.getElementById('save-btn');
  saveBtn.disabled = true;

  // 수정 모드
  if (editingExpenseIdx !== null) {
    const idxToEdit = editingExpenseIdx;
    closeModal(); // editingExpenseIdx 초기화 포함
    try {
      await updateExpense(idxToEdit, {date, amount, category:selectedCat, memo, currency});
    } finally {
      isSavingExpense = false;
      saveBtn.disabled = false;
    }
    return;
  }

  const now = new Date(Date.now() + (settings.timezoneOffset ?? 7) * 3600000);
  const time = `${String(now.getUTCHours()).padStart(2,'0')}:${String(now.getUTCMinutes()).padStart(2,'0')}`;
  const pendingId = Date.now() + Math.random();
  const requestId = `${Date.now()}-${Math.random().toString(36).slice(2)}`;
  const expense = {date, amount, category:selectedCat, memo, currency, time, _pending: true, _pendingId: pendingId, _requestId: requestId};

  allExpenses.push(expense);
  const cat = categories.find(c => c.name === selectedCat);
  if (cat) { cat.count++; saveCats(); }
  closeModal();
  renderHome();

  showSync('syncing');
  try {
    const params = new URLSearchParams({action:'addExpense', date, amount, category:selectedCat, memo, currency, time, requestId});
    const r = await fetchWithTimeout(`${GAS_URL}?${params}`, {}, 20000);
    const j = await r.json();
    if (j.success) {
      expense._pending = false;
      expense._row = j.row || expense._row;
      expense.requestId = j.requestId || requestId;
      delete expense._pendingId;
      delete expense._requestId;
      showSync('synced');
      renderHome();
    } else { throw new Error(); }
  } catch {
    try {
      const verifyResponse = await fetchWithTimeout(GAS_URL, {}, 20000);
      const verifyJson = await verifyResponse.json();
      const alreadySaved = verifyJson.success && verifyJson.data.some(item => expenseFingerprint(item) === expenseFingerprint(expense));
      if (alreadySaved) {
        expense._pending = false; delete expense._pendingId; delete expense._requestId;
        showSync('synced');
      } else {
        saveQueue([...loadQueue(), {date, amount, category:selectedCat, memo, currency, time, _pendingId: pendingId, _requestId: requestId}]);
        showSync('offline');
      }
    } catch {
      saveQueue([...loadQueue(), {date, amount, category:selectedCat, memo, currency, time, _pendingId: pendingId, _requestId: requestId}]);
      showSync('offline');
    }
    renderHome();
  } finally {
    isSavingExpense = false;
    saveBtn.disabled = false;
  }
}

async function updateExpense(idx, {date, amount, category, memo, currency}) {
  const old = allExpenses[idx];
  if (!old) return;
  const time = old.time;
  const oldRow = old._row;
  const oldRequestId = old.requestId || '';
  const wasPending = old._pending;

  // 로컬 즉시 업데이트
  Object.assign(old, {date, amount, category, memo, currency, _pending: true});
  renderHome();
  if (document.getElementById('page-stat').classList.contains('active')) renderStat();

  if (wasPending) {
    // 대기열 항목 업데이트
    const q = loadQueue().map(item =>
      item._pendingId === old._pendingId ? {...item, date, amount, category, memo, currency} : item
    );
    saveQueue(q);
    old._pending = true;
    renderHome();
    return;
  }

  showSync('syncing');
  const updateRequestId = `${Date.now()}-${Math.random().toString(36).slice(2)}`;
  try {
    // 기존 행 삭제 후 새 행 추가
    if (oldRow || oldRequestId) {
      const deleteParams = new URLSearchParams({action:'deleteExpense', row:oldRow || '', requestId:oldRequestId});
      await fetch(`${GAS_URL}?${deleteParams}`);
    }
    const params = new URLSearchParams({action:'addExpense', date, amount, category, memo, currency, time, requestId:updateRequestId});
    const r = await fetchWithTimeout(`${GAS_URL}?${params}`, {}, 20000);
    const j = await r.json();
    if (j.success) {
      old._pending = false;
      old._row = j.row || old._row;
      old.requestId = j.requestId || updateRequestId;
      showSync('synced');
      renderHome();
      if (document.getElementById('page-stat').classList.contains('active')) renderStat();
    } else throw new Error();
  } catch {
    const q = loadQueue();
    q.push({date, amount, category, memo, currency, time, _pendingId: Date.now(), _requestId:updateRequestId});
    saveQueue(q);
    showSync('offline');
    renderHome();
    if (document.getElementById('page-stat').classList.contains('active')) renderStat();
  }
}

function openCatModal(editName) {
  editingCatName = editName;
  const cat = editName ? categories.find(c => c.name === editName) : null;
  document.getElementById('cat-name-input').value = cat ? cat.name : '';
  document.getElementById('cat-modal-title').textContent = editName ? '분류 수정' : '분류 추가';
  document.getElementById('cat-modal-btns').innerHTML = editName
    ? `<button class="btn-cancel" onclick="closeCatModal()">취소</button>
       <button class="btn-delete" onclick="deleteCat('${editName}')">삭제</button>
       <button class="btn-confirm" onclick="confirmCatEdit()">저장</button>`
    : `<button class="btn-cancel" onclick="closeCatModal()">취소</button>
       <button class="btn-confirm" onclick="confirmCatEdit()">추가</button>`;
  document.getElementById('cat-modal-overlay').classList.add('open');
}
function closeCatModal() { document.getElementById('cat-modal-overlay').classList.remove('open'); }
function confirmCatEdit() {
  const name = document.getElementById('cat-name-input').value.trim();
  if (!name) { alert('분류 이름을 입력해주세요'); return; }
  if (editingCatName) {
    const cat = categories.find(c => c.name === editingCatName);
    if (!cat) return;
    if (name !== editingCatName && categories.find(c => c.name === name)) { alert('이미 있는 분류예요'); return; }
    allExpenses.forEach(e => { if (e.category === editingCatName) e.category = name; });
    cat.name = name;
  } else {
    if (categories.find(c => c.name === name)) { alert('이미 있는 분류예요'); return; }
    categories.push({name, count: 0});
  }
  saveCats(); closeCatModal(); renderCatTags(); renderManageCatList();
}
function deleteCat(name) {
  if (!confirm(`"${name}" 분류를 삭제할까요?`)) return;
  categories = categories.filter(c => c.name !== name);
  saveCats();
  if (selectedCat === name) selectedCat = null;
  closeCatModal(); renderCatTags(); renderManageCatList();
}

function renderSettings() {
  // 섹션 제목 업데이트
  const sectionTitles = document.querySelectorAll('#page-settings .settings-section h3');
  if (sectionTitles[0]) sectionTitles[0].textContent = t('usedCurrency');
  if (sectionTitles[1]) sectionTitles[1].textContent = t('baseCurrency');
  if (sectionTitles[2]) sectionTitles[2].textContent = t('timezone');
  if (sectionTitles[3]) sectionTitles[3].textContent = t('languageLabel');

  const descEls = document.querySelectorAll('#page-settings .settings-section p');
  if (descEls[0]) descEls[0].textContent = t('baseCurrencyDesc');
  if (descEls[1]) descEls[1].textContent = t('timezoneDesc');

  // 사용 화폐 토글
  const curNames = t('curNames');
  const toggleList = document.getElementById('currency-toggle-list');
  toggleList.innerHTML = Object.entries(ALL_CURRENCIES).map(([code, info]) => {
    const checked = settings.activeCurrencies.includes(code);
    return `<div class="setting-row">
      <div class="setting-label"><span class="setting-flag">${info.flag}</span>${curNames[code] || info.name} (${code})</div>
      <label class="toggle">
        <input type="checkbox" ${checked?'checked':''} onchange="toggleCurrency('${code}',this.checked)">
        <span class="toggle-slider"></span>
      </label>
    </div>`;
  }).join('');

  // 기준 화폐 라디오
  const baseList = document.getElementById('base-currency-list');
  baseList.innerHTML = Object.entries(ALL_CURRENCIES).map(([code, info]) =>
    `<label class="radio-row">
      <div class="setting-label"><span class="setting-flag">${info.flag}</span>${curNames[code] || info.name} (${code})</div>
      <input type="radio" name="baseCur" value="${code}" ${settings.baseCurrency===code?'checked':''}
        onchange="setBaseCurrency('${code}')">
    </label>`
  ).join('');

  // 시간대 라디오
  const tzList = document.getElementById('timezone-list');
  tzList.innerHTML = TIMEZONES.map(tz =>
    `<label class="radio-row">
      <div class="setting-label">${tz.label}</div>
      <input type="radio" name="tz" value="${tz.offset}" ${settings.timezoneOffset===tz.offset?'checked':''}
        onchange="setTimezone(${tz.offset})">
    </label>`
  ).join('');

  // 언어 라디오
  const langList = document.getElementById('language-list');
  if (langList) langList.innerHTML = LANGUAGES.map(lang =>
    `<label class="radio-row">
      <div class="setting-label">${lang.label}</div>
      <input type="radio" name="lang" value="${lang.code}" ${(settings.language||'ko')===lang.code?'checked':''}
        onchange="setLanguage('${lang.code}')">
    </label>`
  ).join('');

  // 네비 라벨 업데이트
  applyLanguage();
}

function toggleCurrency(code, on) {
  if (on) {
    if (!settings.activeCurrencies.includes(code)) settings.activeCurrencies.push(code);
  } else {
    // 최소 1개는 유지
    if (settings.activeCurrencies.length <= 1) {
      alert('최소 1개는 선택해야 해요');
      renderSettings(); return;
    }
    settings.activeCurrencies = settings.activeCurrencies.filter(c => c !== code);
    // 기준 화폐가 비활성화되면 첫 번째로 변경
    if (!settings.activeCurrencies.includes(settings.baseCurrency)) {
      settings.baseCurrency = settings.activeCurrencies[0];
    }
  }
  saveSettings(settings);
  renderSettings();
  renderHome();
}

function setBaseCurrency(code) {
  settings.baseCurrency = code;
  if (!settings.activeCurrencies.includes(code)) {
    settings.activeCurrencies.push(code);
  }
  saveSettings(settings);
  renderHome();
}

function setTimezone(offset) {
  settings.timezoneOffset = offset;
  saveSettings(settings);
}

function setLanguage(lang) {
  settings.language = lang;
  saveSettings(settings);
  applyLanguage();
  renderHome();
  renderStat();
  renderSettings();
}

  if (catNameInput) catNameInput.placeholder = t('catNamePlaceholder');
}

// ── 통계 ─────────────────────────────────────────────────
function changeMonth(dir) { statMonth.setMonth(statMonth.getMonth()+dir); renderStat(); }

function renderStat() {
  const y = statMonth.getFullYear(), m = statMonth.getMonth()+1;
  const ym = `${y}-${String(m).padStart(2,'0')}`;
  document.getElementById('stat-month-label').textContent = `${y}.${String(m).padStart(2,'0')}`;

  const data = allExpenses.filter(e => e.date.startsWith(ym));
  const base = settings.baseCurrency;

  // 화폐별 합산
  const totals = {};
  data.forEach(e => { const c = e.currency||'THB'; totals[c] = (totals[c]||0)+e.amount; });

  const totalEl = document.getElementById('stat-total-list');
  const totalLabelEl = document.getElementById('stat-total-label');
  const totalEquivEl = document.getElementById('stat-total-equiv');
  const activeTotals = Object.keys(ALL_CURRENCIES).filter(c=>totals[c]);
  totalLabelEl.innerHTML = activeTotals.map(c =>
    `<span>${flagOf(c)} ${c} ${fmtCur(totals[c],c)}</span>`
  ).join('') || `<span>${flagOf(base)} ${base} ${ALL_CURRENCIES[base].symbol}0</span>`;

  // 기준 화폐 합산
  let totalBase = 0;
  let ok = Object.keys(totals).length === 0 || Object.keys(exchangeRates).length > 0;
  Object.entries(totals).forEach(([c,a]) => {
    const v = convertTo(a, c, base);
    if (v===null) ok=false; else totalBase+=v;
  });
  totalEl.innerHTML = `<div class="stat-total-row">${fmtCur(Math.round(ok ? totalBase : (totals[base] || 0)), base)}</div>`;
  totalEquivEl.textContent = t('baseEquivLabel', t('curNames')[base] || ALL_CURRENCIES[base].name);

  // 분류별 (기준 화폐 환산 기준)
  const catMap = {};
  data.forEach(e => {
    const baseAmt = convertTo(e.amount, e.currency||'THB', base) ?? e.amount;
    catMap[e.category] = (catMap[e.category]||0) + baseAmt;
  });
  const catEntries = Object.entries(catMap).sort((a,b)=>b[1]-a[1]);
  const catTotal = catEntries.reduce((s,[,v])=>s+v, 0);
  drawPie(catEntries, catTotal);

  const barList = document.getElementById('cat-bar-list');
  barList.innerHTML = catEntries.map(([cat, baseAmt]) => {
    const pct = catTotal ? Math.round(baseAmt/catTotal*100) : 0;
    const c = categories.find(c=>c.name===cat);
    return `<div class="cat-bar-item">
      <div class="cat-bar-header">
        <span>${cat}</span>
        <span>${flagOf(base)} ${fmtCur(Math.round(baseAmt), base)} (${pct}%)</span>
      </div>
      <div class="cat-bar-bg"><div class="cat-bar-fill" style="width:${pct}%"></div></div>
    </div>`;
  }).join('') || '<div class="empty" style="padding:20px 0">지출 내역이 없어요</div>';

  // 일별 내역 (날짜 내림차순, 같은 날은 시간 내림차순)
  const vt = t => /^\d{2}:\d{2}$/.test(t || '');
  const dayMap = {};
  data.forEach(e => { if(!dayMap[e.date]) dayMap[e.date]=[]; dayMap[e.date].push(e); });
  const days = Object.keys(dayMap).sort((a,b)=>b.localeCompare(a));
  document.getElementById('day-list').innerHTML = days.map(d => {
    const items = [...dayMap[d]].sort((a,b) => {
      const ta = vt(a.time) ? a.time : '00:00';
      const tb = vt(b.time) ? b.time : '00:00';
      return tb.localeCompare(ta);
    });
    const dayBase = items.reduce((s,e)=>{
      return s + (convertTo(e.amount, e.currency||'THB', base) ?? e.amount);
    }, 0);
    return `<div class="day-group">
      <div class="day-group-header"><span>${d}</span><span>${flagOf(base)} ${fmtCur(Math.round(dayBase), base)}</span></div>
      ${items.map(e => {
        const c = categories.find(c=>c.name===e.category);
        const cur = e.currency||'THB';
        const tStr = vt(e.time) ? `<span style="color:var(--sub);font-size:11px;margin-left:4px;">${e.time}</span>` : '';
        const idx2 = allExpenses.indexOf(e);
        const pBadge = e._pending ? `<div class="pending-badge"><div class="pending-dot"></div>${t('pendingBadge')}</div>` : '';
        const catColor2 = getCatColor(e.category||'기타');
        return `<div class="swipe-wrap" id="sw-stat-${idx2}">
          <div class="expense-item">
            <div class="expense-info">
              <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;">
                <div class="expense-cat" style="background:${catColor2}">${e.category||'기타'}</div>
                ${e.memo?`<div class="expense-memo">— ${e.memo}</div>`:''}
                ${tStr}
              </div>
              ${pBadge}
            </div>
            <div class="expense-right">
              <span class="cur-flag">${flagOf(cur)}</span>
              <div class="expense-right-inner">
                <div class="expense-amount">-${fmtCur(e.amount,cur)}</div>
              </div>
            </div>
          </div>
          <div class="swipe-actions">
            <div class="swipe-edit-btn" onclick="editExpense(${idx2})">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
              ${t('edit')}
            </div>
            <div class="swipe-delete-btn" onclick="deleteExpense(${idx2})">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
              ${t('del')}
            </div>
          </div>
        </div>`;
      }).join('')}
    </div>`;
  }).join('') || '<div class="empty" style="padding:20px 0">지출 내역이 없어요</div>';
}

function drawPie(entries, total) {
  const canvas = document.getElementById('pieChart');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0,0,W,H);
  if (!entries.length || !total) {
    ctx.fillStyle = '#E8E8F0'; ctx.beginPath(); ctx.arc(W/2,H/2,W/2-4,0,Math.PI*2); ctx.fill(); return;
  }
  const COLORS = ['#5B6AF0','#FF6B9D','#FFB830','#00C9A7','#FF5C5C','#845EC2','#0081CF','#F9A825'];
  let start = -Math.PI/2;
  entries.forEach(([,amt], i) => {
    const slice = (amt/total)*Math.PI*2;
    ctx.beginPath(); ctx.moveTo(W/2,H/2);
    ctx.arc(W/2,H/2,W/2-4,start,start+slice);
    ctx.fillStyle = COLORS[i%COLORS.length]; ctx.fill();
    start += slice;
  });
  ctx.beginPath(); ctx.arc(W/2,H/2,W/4,0,Math.PI*2); ctx.fillStyle='#fff'; ctx.fill();
}

// ── 토스트 ───────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// ── 로딩 오버레이 ─────────────────────────────────────────
function showLoading() { document.getElementById('load-overlay').classList.remove('hidden'); }
function hideLoading() { document.getElementById('load-overlay').classList.add('hidden'); }

// ── 동기화 상태 바 ────────────────────────────────────────
let syncTimer = null;
function hideSync() {
  const bar = document.getElementById('sync-bar');
  bar.className = 'sync-bar';
  document.getElementById('sync-dot').className = 'sync-dot';
  document.getElementById('sync-text').textContent = '';
}
function showSync(state) { // 'syncing' | 'synced' | 'error'
  const bar = document.getElementById('sync-bar');
  const dot = document.getElementById('sync-dot');
  const txt = document.getElementById('sync-text');
  clearTimeout(syncTimer);
  bar.className = `sync-bar show ${state}`;
  if (state === 'syncing') {
    dot.className = 'sync-dot spinning';
    txt.textContent = '동기화 중...';
  } else if (state === 'synced') {
    dot.className = 'sync-dot';
    txt.textContent = '✓ 동기화 완료';
    syncTimer = setTimeout(hideSync, 1800);
  } else if (state === 'offline') {
    dot.className = 'sync-dot';
    txt.textContent = '📴 오프라인 — 연결 시 자동 동기화';
    syncTimer = setTimeout(hideSync, 3500);
  } else {
    dot.className = 'sync-dot';
    txt.textContent = '⚠️ 저장 실패 — 네트워크 확인';
    syncTimer = setTimeout(hideSync, 4000);
  }
}

// ── 스와이프 삭제 ─────────────────────────────────────────
function deleteExpense(idx) {
  const expense = allExpenses[idx];
  if (!expense) return;
  if (!confirm(`"${expense.category}" ${fmtCur(expense.amount, expense.currency||'THB')} 삭제할까요?`)) {
    // 닫기: 열려있는 swipe-wrap 초기화
    document.querySelectorAll('.swipe-wrap .expense-item').forEach(el => el.style.transform = '');
    return;
  }
  const row = expense._row;
  const requestId = expense.requestId || '';
  allExpenses.splice(idx, 1);
  renderHome();
  if (document.getElementById('page-stat').classList.contains('active')) renderStat();
  if (!row && !requestId) return; // 아직 서버에 저장되지 않은 로컬 항목
  showSync('syncing');
  const params = new URLSearchParams({action:'deleteExpense', row, requestId});
  fetch(`${GAS_URL}?${params}`)
    .then(r => r.json())
    .then(j => showSync(j.success ? 'synced' : 'error'))
    .catch(() => showSync('error'));
}

// 스와이프 제스처 (터치)
let swipeTouchState = null;
document.addEventListener('touchstart', e => {
  const wrap = e.target.closest('.swipe-wrap');
  if (!wrap) { closeAllSwipes(); return; }
  const item = wrap.querySelector('.expense-item');
  if (!item) return;
  swipeTouchState = { wrap, item, startX: e.touches[0].clientX, startY: e.touches[0].clientY, moved: false };
}, { passive: true });

document.addEventListener('touchmove', e => {
  if (!swipeTouchState) return;
  const { item, startX, startY } = swipeTouchState;
  const dx = e.touches[0].clientX - startX;
  const dy = e.touches[0].clientY - startY;
  if (!swipeTouchState.moved && Math.abs(dy) > Math.abs(dx)) { swipeTouchState = null; return; }
  swipeTouchState.moved = true;
  if (dx < 0) {
    item.style.transform = `translateX(${Math.max(dx, -80)}px)`;
    item.style.transition = 'none';
  }
}, { passive: true });

document.addEventListener('touchend', e => {
  if (!swipeTouchState || !swipeTouchState.moved) { swipeTouchState = null; return; }
  const { wrap, item, startX } = swipeTouchState;
  const dx = e.changedTouches[0].clientX - startX;
  item.style.transition = 'transform .15s';
  if (dx < -50) {
    item.style.transform = 'translateX(-152px)';
    // 다른 wrap 닫기
    document.querySelectorAll('.swipe-wrap').forEach(w => {
      if (w !== wrap) w.querySelector('.expense-item').style.transform = '';
    });
  } else {
    item.style.transform = '';
  }
  swipeTouchState = null;
});

function closeAllSwipes() {
  document.querySelectorAll('.swipe-wrap .expense-item').forEach(el => {
    el.style.transition = 'transform .15s';
    el.style.transform = '';
  });
}

// ── 수정 모달 열기 ────────────────────────────────────────
function editExpense(idx) {
  const e = allExpenses[idx];
  if (!e) return;
  closeAllSwipes();
  editingExpenseIdx = idx;
  document.querySelector('.modal-title').textContent = '지출 수정';
  document.getElementById('amount-input').value = e.amount;
  document.getElementById('date-input').value = e.date;
  document.getElementById('memo-input').value = e.memo || '';
  buildCurrencySelect();
  const sel = document.getElementById('currency-select');
  if ([...sel.options].some(o => o.value === e.currency)) sel.value = e.currency;
  selectedCat = e.category;
  renderCatTags();
  document.getElementById('modal-overlay').classList.add('open');
}

// ── 초기화 ───────────────────────────────────────────────
(function init() {
  document.getElementById('stat-month-label').textContent =
    `${statMonth.getFullYear()}.${String(statMonth.getMonth()+1).padStart(2,'0')}`;

  applyLanguage();
  loadCategories().then(() => { renderCatTags(); });
  loadData();
  loadExchangeRates();

  // 인터넷 연결 시 자동 동기화
  window.addEventListener('online', () => {
    showSync('syncing');
    if (loadQueue().length) flushQueue();
    else loadData();
  });
})();
</script>
